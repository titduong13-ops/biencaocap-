        <span class="counter">${data.vocab.length} từ</span>
      </div>
      <div class="grid-2">
        ${data.vocab.map(v => `<div class="card card-vocab">🇷🇺 ${v.ru}<br>🇻🇳 <b>${v.vn}</b></div>`).join('')}
      </div>

      <div class="section-title">
        🧩 Cấu trúc cần nhớ
        <span class="counter">${data.structs.length} cấu trúc</span>
      </div>
      <div class="grid-2">
        ${data.structs.map(s => `<div class="card card-struct">🔸 ${s.ru}<br>🔹 <b>${s.vn}</b></div>`).join('')}
      </div>

      <div class="section-title">
        ✍️ Luyện dịch thực tế
        <span class="counter">${data.exercises.length} câu</span>
      </div>
    `;

    data.exercises.forEach((ex, index) => {
      html += `
        <div class="card" style="margin-top:20px;">
          <strong>[${ex.dir}] Câu ${index + 1}:</strong> ${ex.q}
          <textarea placeholder="Gõ bản dịch của bạn vào đây để luyện trí nhớ..."></textarea>
          <button class="btn-check" onclick="document.getElementById('fb-${index}').style.display='block'">Kiểm tra đáp án</button>
          <div id="fb-${index}" class="feedback">
            <b>Đáp án chuẩn:</b> ${ex.a}<br>
            <div class="note">💡 ${ex.note}</div>
          </div>
        </div>
      `;
    });

    document.getElementById('content').innerHTML = html;
  }

  renderTabs();
  renderContent();
</script>
</body>
</html>
